
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BACCARAT SMART</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BACCARAT SMART STABLE</h1>
        
        <div class="buttons">
            <button onclick="addResult('P')" class="player">Player</button>
            <button onclick="addResult('B')" class="banker">Banker</button>
            <button onclick="addResult('T')" class="tie">Tie</button>
            <button onclick="resetGame()" class="reset">Reset</button>
        </div>

        <div class="history">
            <h3>Last Results</h3>
            <p id="history"></p>
        </div>

        <div class="prediction">
            <h2>Prediction</h2>
            <p id="prediction">Waiting for data...</p>
            <p id="confidence"></p>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
